# ============================================================================
# Конфігурація Генератора Графіків АСКУЕ
# ============================================================================
# Цей файл є єдиним джерелом параметрів проєкту.
# SQLite-налаштування використовуються як runtime-override для частини параметрів.

# ----------------------------------------------------------------------------
# ПРОЄКТ
# ----------------------------------------------------------------------------
project:
  name: "Генератор графіків АСКОЕ"
  window_title: "АСКОЕ — Генератор графіків"  # Назва у заголовку вікна програми
  language: "uk"  # Мова інтерфейсу та документів

# ----------------------------------------------------------------------------
# АРХІВ ГРАФІКІВ
# ----------------------------------------------------------------------------
# Параметри для аналізу історичних графіків
archive:
  path: "./Архів графіків роботи"  # Шлях до папки з архівними Excel-файлами
  canonical_codes:  # Канонічні коди змін (використовуються в системі)
    - "Р"  # Робочий день
    - "Д"  # Чергування (Duty)
    - "В"  # Вихідний
    - "О"  # Відпустка

# ----------------------------------------------------------------------------
# АНАЛІЗ АРХІВУ
# ----------------------------------------------------------------------------
# Спостереження з реальних графіків 2025-2026 для калібрування алгоритму
archive_analysis:
  daily_duty_per_day: 2  # Кількість чергувань Д на день (інваріант архіву)
  daily_regular_per_day_min: 0  # Мінімум робочих днів Р на день
  daily_regular_per_day_max: 2  # Максимум робочих днів Р на день
  work_run_min: 1  # Мінімальна серія робочих днів підряд
  work_run_max_observed: 9  # Максимальна серія робочих днів у архіві
  off_run_min: 1  # Мінімальна серія вихідних підряд
  off_run_max_observed: 9  # Максимальна серія вихідних у архіві
  notes:
    - "Архів 2025 містить старі коди 8 і 5-3."
    - "Архів 2026 переходить на коди Р, Д, В, О."
    - "Щодня спостерігаються рівно 2 чергування."

# ----------------------------------------------------------------------------
# ДОКУМЕНТ
# ----------------------------------------------------------------------------
# Параметри для експорту в Excel/PDF
document:
  company_name: "ТОВ \"Іст Енержі Інжиніринг\""  # Назва організації
  director_title: "Заступник директора"  # Посада керівника
  director_name: "С.Г. Ушенко"  # ПІБ керівника
  department_name: "Відділ комерціїного обліку електроенергії"  # Назва відділу
  schedule_title: "Графік роботи інженерів АСКОЕ"  # Заголовок документа

# ----------------------------------------------------------------------------
# КАЛЕНДАР
# ----------------------------------------------------------------------------
calendar:
  martial_law: true  # Режим воєнного стану (впливає на святкові дні)
                     # true: будні свята (1.01, 7.01) не є special days
                     # false: будні свята є special days

# ----------------------------------------------------------------------------
# КОДИ ЗМІН
# ----------------------------------------------------------------------------
shifts:
  # Alias-и для зворотної сумісності зі старими графіками
  aliases:
    "8": "Р"      # Старий код → Робочий день
    "5-3": "Д"    # Старий код → Чергування
    "Ч": "Д"      # Старий код → Чергування
    "Д": "Д"      # Канонічний код
    "Р": "Р"      # Канонічний код
    "В": "В"      # Канонічний код
    "О": "О"      # Канонічний код (кирилиця)
    "O": "О"      # Латинська O → кирилична О
  
  # Визначення кодів змін для UI та експорту
  definitions:
    "Р":
      label: "Робочий день (8)"  # Підпис для UI
      hours: 8  # Кількість годин
      color: "#AEC6E8"  # Колір у таблиці (світло-синій)
    "Д":
      label: "Чергування (5-3)"  # Підпис для UI
      hours: 8  # Кількість годин (5 вдень + 3 вночі)
      color: "#FFF3B0"  # Колір у таблиці (жовтий)
    "В":
      label: "Вихідний"  # Підпис для UI
      hours: 0  # Не робочий день
      color: "#D9D9D9"  # Колір у таблиці (сірий)
    "О":
      label: "Відпустка"  # Підпис для UI
      hours: 0  # Не робочий день
      color: "#FFD580"  # Колір у таблиці (помаранчевий)

# ----------------------------------------------------------------------------
# ГЕНЕРАЦІЯ ГРАФІКА
# ----------------------------------------------------------------------------
generation:
  # --- Денні патерни ---
  target_duty_per_day: 2  # Цільова кількість чергувань Д на день (hard constraint)
  daily_regular_per_day_min: 0  # Мінімум робочих днів Р на день
  daily_regular_per_day_max: 1  # Максимум робочих днів Р на день
  
  weekday_regular_target: 1  # Бажана кількість Р на звичайний будній день
  special_day_regular_target: 0  # Бажана кількість Р на вихідний/святковий день
  
  # --- Початок місяця ---
  month_start_full_staff_days: 4  # Перші N днів місяця з повним складом (2Р+2Д)
  month_start_regular_per_day: 1  # Кількість Р на день у перші дні місяця
  
  # --- Обмеження серій ---
  max_consecutive_work_days: 6  # Бажаний максимум робочих днів підряд (soft)
  hard_max_consecutive_work_days: 9  # Жорсткий максимум робочих днів підряд (hard constraint)
  max_consecutive_duty_days: 5  # Максимум чергувань Д підряд (hard constraint)
                                  # Працівник не може отримати Д, якщо вже має 5 Д підряд
  
  max_vacation_overlap: 1  # Максимум працівників одночасно у відпустці
  
  # --- Норма робочих днів ---
  work_days_tolerance: 1  # Допуск по кількості робочих днів (±N днів від норми)
  use_auto_norm: true  # Автоматично розраховувати норму по календарю
  
  # --- Вихідні ---
  weekend_pairing: true  # Намагатися давати вихідні парами (субота+неділя)
  weekend_auto_regular_allowed: false  # Чи дозволено автоматично ставити Р на вихідні
  
  # --- Ваги scoring функції ---
  scoring:
    # Профільні ваги
    split_ch_duty: 0        # split_CH отримав Д (нейтрально)
    split_ch_regular: 40    # split_CH отримав Р (штраф, небажано)
    split_ch_off: 8         # split_CH отримав В з дефіцитом роботи
    full_r_regular: -22     # full_R отримав Р (бонус, бажано)
    full_r_duty: 60         # full_R отримав Д (сильний штраф, заборонено)
    full_r_off: 8           # full_R отримав В з дефіцитом роботи
    mixed_regular: -14      # mixed отримав Р на будніх (бонус)
    mixed_duty: 4           # mixed отримав Д на special day (легкий штраф)
    mixed_off: 6            # mixed отримав В з дефіцитом роботи
    mixed_weekday_duty: 35  # mixed отримав Д на будніх (штраф — небажано)
    mixed_weekday_regular: -20  # mixed отримав Р на будніх (сильний бонус)
    
    # Початок місяця
    busy_start_split_ch_non_duty: 14    # split_CH не отримав Д на старті місяця
    busy_start_full_r_non_regular: 18   # full_R не отримав Р на старті місяця
    busy_start_mixed_non_regular: 16    # mixed не отримав Р на старті місяця
    special_day_regular: 25             # Р на special day (штраф)
    
    # Дефіцити
    work_deficit: 8         # Штраф за дефіцит робочих днів
    min_deficit: 12         # Штраф за дефіцит нижче мінімуму
    off_work_deficit: 4     # Штраф за дефіцит роботи коли В
    off_min_deficit: 10     # Штраф за дефіцит мінімуму коли В
    duty_deficit: 6         # Штраф за дефіцит чергувань
    split_ch_duty_deficit: 4  # Штраф за дефіцит чергувань для split_CH
    
    # Побажання та блокування
    desired_shift_match: -18    # Збіг з бажаною зміною (бонус)
    desired_shift_mismatch: 7   # Незбіг з бажаною зміною (штраф)
    locked_by_wish: -40         # Заблоковано побажанням (сильний бонус)
    locked_by_rule: -16         # Заблоковано правилом (бонус)
    
    # Серії
    streak_continue: -6         # Продовження серії робочих днів (бонус)
    streak_break_to_off: 3      # Переривання серії на В (бонус)
    streak_start_after_off: 1   # Початок роботи після В (легкий бонус)
    work_streak_near_max: 25    # Робоча серія близька до максимуму (штраф)
    duty_streak_near_max: 8     # Серія Д близька до максимуму (штраф)
    
    # Вихідні пари
    weekend_pairing: -30        # Вихідний поруч з іншим вихідним (бонус для пар)
    
    # split_CH та require_work
    split_ch_duty_streak_continue: 8  # Продовження серії Д для split_CH (штраф, прогресивний)
    require_work_streak_break: -30    # Проактивне переривання require_work серії (бонус)


# ----------------------------------------------------------------------------
# ЕКСПОРТ
# ----------------------------------------------------------------------------
export:
  default_dir: "./exports"  # Папка для збереження експортованих файлів
  template: "archive_2026"  # Шаблон форматування (відповідає архіву 2026)
  
  # --- Шаблони назв файлів ---
  # Підтримувані змінні: {year}, {month}, {month_name_ua}
  # Приклад: "Графік_{year}_{month:02d}.xlsx" → "Графік_2026_04.xlsx"
  # Приклад: "Графік роботи інженерів АСКОЕ_{month_name_ua}_{year}.xlsx" → "Графік роботи інженерів АСКОЕ_КВІТЕНЬ_2026.xlsx"
  filename_template:
    excel: "Графік роботи групи АСКОЕ_{month_name_ua}_{year}.xlsx"
    pdf: "Графік роботи групи АСКОЕ_{month_name_ua}_{year}.pdf"
  
  # --- Примітка про чергування ---
  duty_note: "Примітка: Д — Чергування, робота з перервою, вранці 5 год (08:00–13:00), вночі 3 год (22:00–01:00)"
  
  # --- Умовні позначення ---
  legend:
    - code: "Д"
      description: "— Чергування"
    - code: "Р"
      description: "— Робочий день"
    - code: "В"
      description: "— Вихідний"
    - code: "О"
      description: "— Відпустка"
  
  # --- Excel ---
  excel:
    sheet_title_mode: "month-year"  # Формат назви аркуша: "Травень 2026"
    font_name: "Arial Cyr"  # Шрифт для таблиці
    title_font_size: 14  # Розмір шрифту заголовка
    base_font_size: 12  # Розмір шрифту основного тексту
  
  # --- PDF ---
  pdf:
    page_size: "A4"  # Розмір сторінки
    orientation: "landscape"  # Орієнтація: landscape (альбомна) або portrait (книжкова)

# ----------------------------------------------------------------------------
# ЛОГУВАННЯ
# ----------------------------------------------------------------------------
logging:
  level: "DEBUG"              # Рівень логування для файлу: DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/app.log"        # Шлях до файлу логів (відносно project_root)
  max_bytes: 5242880          # 5 MB — максимальний розмір одного файлу логу
  backup_count: 3             # Кількість резервних файлів (rotating)
  console_level: "INFO"       # Рівень для консолі (вищій, щоб не шуміти)
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# ----------------------------------------------------------------------------
# UI
# ----------------------------------------------------------------------------
ui:
  # Доступні значення для редагування клітинок графіка
  editable_shift_values:
    - ""   # Порожнє значення (очистити)
    - "Р"  # Робочий день
    - "Д"  # Чергування
    - "В"  # Вихідний
    - "О"  # Відпустка
